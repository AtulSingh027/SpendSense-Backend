version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: spendsense_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: spend_sense
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spend_sense"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
